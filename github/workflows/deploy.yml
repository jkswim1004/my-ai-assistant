# deploy.yml
# main 브랜치에 push가 발생하면 GitHub Pages에 자동 배포합니다.
# update-data.yml이 JSON을 커밋하면 이 워크플로우가 이어서 배포됩니다.

name: GitHub Pages 배포

on:
  # main 브랜치에 push될 때마다 배포
  push:
    branches:
      - main

  # 수동 배포 (Actions 탭 → Run workflow)
  workflow_dispatch:

# GitHub Pages 배포 + 오래된 실행 기록 삭제 권한
permissions:
  contents: read
  pages:    write
  id-token: write
  actions:  write

# 동시에 배포가 진행 중이면 이전 것을 취소하고 최신 것만 배포
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. 저장소 체크아웃
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      # 2. GitHub Pages 설정
      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      # 3. 아티팩트 업로드 (정적 사이트 전체를 업로드)
      - name: Pages 아티팩트 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          # 저장소 루트 전체를 업로드
          path: '.'

      # 4. GitHub Pages 배포
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4

      # 5. 오래된 실행 기록 정리 (최근 10개만 유지)
      - name: 오래된 실행 기록 삭제
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          WORKFLOW="deploy.yml"
          KEEP=10

          OLD_IDS=$(gh api "repos/$REPO/actions/workflows/$WORKFLOW/runs?per_page=100" \
            --jq ".workflow_runs[$KEEP:][].id")

          if [ -z "$OLD_IDS" ]; then
            echo "삭제할 오래된 실행 기록 없음 (현재 ${KEEP}개 이하)"
          else
            for id in $OLD_IDS; do
              gh api --method DELETE "repos/$REPO/actions/runs/$id"
              echo "삭제: run #$id"
            done
          fi
